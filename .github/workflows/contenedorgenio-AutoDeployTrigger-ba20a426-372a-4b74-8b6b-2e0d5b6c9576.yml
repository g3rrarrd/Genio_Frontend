name: Trigger auto deployment for contenedorgenio

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/contenedorgenio-AutoDeployTrigger-ba20a426-372a-4b74-8b6b-2e0d5b6c9576.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTENEDORGENIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTENEDORGENIO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTENEDORGENIO_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: genio.azurecr.io
          registryUsername: ${{ secrets.CONTENEDORGENIO_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTENEDORGENIO_REGISTRY_PASSWORD }}
          containerAppName: contenedorgenio
          resourceGroup: NetworkWatcherRG
          imageToBuild: genio.azurecr.io/contenedorgenio:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


