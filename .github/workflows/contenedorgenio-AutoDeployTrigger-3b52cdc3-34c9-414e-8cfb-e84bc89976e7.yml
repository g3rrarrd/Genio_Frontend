name: Trigger auto deployment for contenedorgenio

on:
  push:
    branches: [ main ]
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTENEDORGENIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTENEDORGENIO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTENEDORGENIO_AZURE_SUBSCRIPTION_ID }}

      # 1. Login directo a Docker (Más fiable)
      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: genio.azurecr.io
          username: ${{ secrets.CONTENEDORGENIO_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTENEDORGENIO_REGISTRY_PASSWORD }}

      # 2. Build y Push nativo
      - name: Build and push image
        run: |
          docker build . -t genio.azurecr.io/contenedorgenio:${{ github.sha }} \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }}
          docker push genio.azurecr.io/contenedorgenio:${{ github.sha }}

      # 3. Solo avisar a Azure que use la imagen nueva
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: genio.azurecr.io/contenedorgenio:${{ github.sha }}
          containerAppName: contenedorgenio
          resourceGroup: NetworkWatcherRG
          environmentVariables: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
