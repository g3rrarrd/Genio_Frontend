name: Trigger auto deployment for contenedorgenio

on:
  push:
    branches: [ main ]
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3 # Actualizado a v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTENEDORGENIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTENEDORGENIO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTENEDORGENIO_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          # USAMOS EL ACR QUE YA TIENE PERMISOS
          acrName: genio 
          acrUsername: ${{ secrets.CONTENEDORGENIO_REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.CONTENEDORGENIO_REGISTRY_PASSWORD }}
          containerAppName: contenedorgenio
          resourceGroup: NetworkWatcherRG
          # Definimos la imagen correctamente usando el ACR
          imageToBuild: genio.azurecr.io/contenedorgenio:${{ github.sha }}
          buildArguments: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          environmentVariables: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
