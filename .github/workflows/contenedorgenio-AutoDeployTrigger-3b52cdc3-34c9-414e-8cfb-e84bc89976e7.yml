name: Trigger auto deployment for contenedorgenio

on:
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/contenedorgenio-AutoDeployTrigger-998ba94b-ab0a-4149-9f6d-d5df17c9ae3a.yml'

  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTENEDORGENIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTENEDORGENIO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTENEDORGENIO_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: # Tu URL de registro aquí (ej: mocr.azurecr.io)
          registryUsername: ${{ secrets.CONTENEDORGENIO_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTENEDORGENIO_REGISTRY_PASSWORD }}
          containerAppName: contenedorgenio
          resourceGroup: NetworkWatcherRG
          imageToBuild: default/contenedorgenio:${{ github.sha }}
          buildArguments: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          environmentVariables: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
