
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Genio Mundialista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" crossorigin="anonymous" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                screens: {
                    'sm': '640px',
                    'md': '768px',
                    'lg': '1024px',
                    'xl': '1280px',
                    '2xl': '1536px',
                    '3xl': '1080px',
                    '4k': '2560px',
                },
                extend: {
                    colors: {
                        "primary": "#f5821f",
                        "secondary": "#f5821f",
                        "background-dark": "#0a0a0a",
                        "card-bg": "#1a1a1a",
                        "danger": "#f20d0d",
                        "success": "#13ec5b"
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                        "display": ["Space Grotesk", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            min-height: 100%;
            width: 100%;
        }
        body {
            background-color: #102216;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #root {
            min-height: 100dvh;
            width: 100%;
        }
        .soccer-pattern {
            background-image: radial-gradient(#1c271f 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        /* Ocultar barra de scroll en listas internas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
